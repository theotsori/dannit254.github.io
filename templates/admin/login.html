<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Dannit Media Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e; --black: #060606; --black-2: #0e0e0e; --white: #f5f0eb; --gray: #888880;
  --font-display: 'Cinzel', serif; --font-body: 'Cormorant Garamond', serif; --font-ui: 'Jost', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-ui);
  background: var(--black);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(rgba(201,169,110,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,110,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.login-box {
  position: relative; z-index: 1;
  background: rgba(14,14,14,0.9);
  border: 1px solid rgba(201,169,110,0.15);
  padding: 3.5rem 3rem;
  width: 100%; max-width: 420px;
  backdrop-filter: blur(10px);
}
.login-logo {
  font-family: var(--font-display);
  font-size: 1.6rem;
  color: var(--white);
  text-align: center;
  margin-bottom: 0.5rem;
}
.login-logo span { color: var(--gold); }
.login-sub {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gray);
  text-align: center;
  margin-bottom: 3rem;
}
.form-field { margin-bottom: 1.5rem; }
.form-field label {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 0.6rem;
}
.form-field input {
  width: 100%;
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--white);
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,169,110,0.15);
  padding: 0.9rem 1.2rem;
  outline: none;
  transition: border-color 0.3s;
}
.form-field input:focus { border-color: var(--gold); }
.login-btn {
  width: 100%;
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--black);
  background: var(--gold);
  border: none;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 0.5rem;
}
.login-btn:hover { background: #e8d5b0; }
.error-msg {
  background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.3);
  color: #ff9494;
  font-size: 0.8rem;
  padding: 0.8rem 1rem;
  margin-bottom: 1.5rem;
  text-align: center;
}
.back-link {
  display: block;
  text-align: center;
  margin-top: 2rem;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray);
  text-decoration: none;
  transition: color 0.3s;
}
.back-link:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">Dannit<span>.</span></div>
  <div class="login-sub">Admin Panel</div>
  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-field">
      <label>Username</label>
      <input type="text" name="username" required autofocus autocomplete="username">
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <button class="login-btn" type="submit">Sign In</button>
  </form>
  <a href="/" class="back-link">← Back to Website</a>
</div>
</body>
</html>
